<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos | Hireando</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --verde-primario: #2EAD5B; 
            --violeta-oscuro: #6B42C1; 
            --gris-texto: #4A4A4A; 
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f9f9f9; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Asegura que el footer se empuje al fondo */
            margin: 0;
        }

        .content-wrapper {
            flex: 1; /* Esto hace que el contenido crezca y el footer baje */
            padding-bottom: 50px; 
        }

        .form-container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            margin-top: 50px; 
        }

        .btn-enviar { 
            background-color: var(--violeta-oscuro); 
            color: white; 
            border: none; 
            padding: 10px 30px; 
            border-radius: 8px; 
            width: 100%; 
            transition: all 0.3s ease;
        }

        .btn-enviar:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .nav-link { color: var(--gris-texto); font-weight: 500; margin: 0 10px; }
        .btn-contactanos { background-color: var(--verde-primario); color: white; border-radius: 50px; padding: 8px 25px; border: none; }
    </style>
</head>
<body>
    
    <header id="menu-placeholder"></header>

    <main class="content-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 form-container">
                    <h2 class="text-center mb-4" style="color: var(--violeta-oscuro);">¡Hablemos!</h2>
                    <form name="contacto" method="POST" data-netlify="true">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" name="nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mensaje</label>
                            <textarea id="mensajeInput" name="mensaje" class="form-control" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn-enviar">Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer-placeholder"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        /**
         * Función para cargar componentes externos de forma reutilizable
         */
        async function loadComponent(url, elementId) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`No se pudo cargar ${url}`);
                const html = await response.text();
                document.getElementById(elementId).innerHTML = html;
            } catch (error) {
                console.error("Error cargando componente:", error);
            }
        }

        // Ejecutar cargas al iniciar el DOM
        document.addEventListener('DOMContentLoaded', () => {
            // Cargar Nav y Footer
            loadComponent('nav.html', 'menu-placeholder');
            loadComponent('footer.html', 'footer-placeholder');

            // Lógica de parámetros de URL (Sticky form)
            const urlParams = new URLSearchParams(window.location.search);
            const source = urlParams.get('ref');

            if (source === 'planes') {
                const mensajeArea = document.getElementById('mensajeInput');
                if (mensajeArea) {
                    mensajeArea.value = "Hola, estuve viendo los planes de Hireando y me gustaría recibir más información.\n¿Podrían ayudarme a encontrar el plan ideal para mi búsqueda?";
                }
            }
        });
    </script>
</body>
</html>
