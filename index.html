<div id="footer-placeholder"></div>

<script>
    /**
     * Carga componentes HTML externos de forma asíncrona
     * @param {string} url - Ruta del archivo .html
     * @param {string} id - ID del contenedor donde se insertará
     */
    async function incluirComponente(url, id) {
        try {
            const respuesta = await fetch(url);
            if (!respuesta.ok) throw new Error(`No se pudo cargar: ${url}`);
            const html = await respuesta.text();
            document.getElementById(id).innerHTML = html;
        } catch (error) {
            console.error("Error al cargar componente:", error);
        }
    }

    // Llamadas para esta página
    document.addEventListener("DOMContentLoaded", () => {
        incluirComponente('nav.html', 'menu-placeholder');
        incluirComponente('footer.html', 'footer-placeholder');
    });
</script>
