<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hireando | Reclutamiento Ágil & Accesible</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;1,600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --verde-primario: #2EAD5B; 
            --verde-claro: #66C266; 
            --violeta-oscuro: #6B42C1; 
            --violeta-claro: #A77BE6; 
            --gris-texto: #4A4A4A; 
        }
        
        /* Estructura para empujar el footer al fondo */
        body { 
            font-family: 'Poppins', sans-serif; 
            color: var(--gris-texto); 
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hero { 
            flex: 1; /* Esto hace que el contenido principal ocupe el espacio disponible */
            position: relative; 
            padding: 30px 0 80px 0; 
            background: linear-gradient(135deg, #ffffff 60%, #f9f9f9 100%); 
            display: flex; 
            align-items: center; 
        }

        .hero h1 { 
            font-weight: 600; 
            font-style: italic; 
            font-size: 3.5rem; 
            line-height: 1.1; 
        }

        .text-purple { color: var(--violeta-oscuro); }
        .text-green { color: var(--verde-primario); }
        
        .hero p { font-size: 1.2rem; margin: 20px 0; max-width: 450px; }
        
        .btn-servicios { 
            background-color: var(--verde-primario); 
            color: white; 
            border-radius: 8px; 
            padding: 12px 30px; 
            text-decoration: none; 
            display: inline-block; 
            font-weight: 600; 
            transition: 0.3s; 
        }
        
        .btn-servicios:hover { 
            background-color: var(--verde-claro); 
            transform: translateY(-2px); 
            color: white; 
        }

        .img-hero { 
            border-radius: 0 0 0 100px; 
            object-fit: cover; 
            width: 100%; 
            height: 500px; 
            box-shadow: -20px 20px 0px var(--violeta-claro); 
        }

        @media (max-width: 991px) {
            .hero { padding: 40px 0; }
            .hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div id="menu-placeholder"></div>

    <section class="hero">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6" data-aos="fade-right">
                    <h1>
                        <span class="text-purple">Simple. Rápido.</span><br>
                        <span class="text-green">Hireando.</span>
                    </h1>
                    <p>Encontramos el talento que tu empresa necesita.</p>
                    <a href="servicios.html" class="btn-servicios">CONOCÉ NUESTROS SERVICIOS</a>
                </div>
                <div class="col-lg-6 mt-5 mt-lg-0" data-aos="fade-left">
                    <img src="fotoParaIndex.jpeg" alt="Equipo Hireando" class="img-hero">
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        
        // Carga del menú
        fetch('nav.html')
            .then(res => res.text())
            .then(data => { 
                document.getElementById('menu-placeholder').innerHTML = data; 
            })
            .catch(err => console.error('Error cargando el nav:', err));

        // Carga del Footer (Tal como en contactanos.html)
        fetch('footer.html')
            .then(res => res.text())
            .then(data => { 
                document.getElementById('footer-placeholder').innerHTML = data; 
            })
            .catch(err => console.warn("Archivo footer.html no encontrado"));
    </script>
</body>
</html>
