<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hireando | Reclutamiento Ágil & Accesible</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --verde-primario: #2EAD5B;
            --verde-claro: #66C266;
            --violeta-oscuro: #6B42C1;
            --violeta-claro: #A77BE6;
            --gris-texto: #4A4A4A;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--gris-texto);
            overflow-x: hidden;
        }

        /* Navbar personalizada */
        .navbar {
            padding: 1rem 2rem;
            background: white;
        }
        .nav-link {
            color: var(--gris-texto);
            font-weight: 500;
            margin: 0 10px;
        }
        .btn-contactanos {
            background-color: var(--verde-primario);
            color: white;
            border-radius: 50px;
            padding: 8px 25px;
            border: none;
        }

        /* Hero Section */
        .hero {
            position: relative;
            padding: 100px 0;
            background: linear-gradient(135deg, #ffffff 60%, #f9f9f9 100%);
            min-height: 80vh;
            display: flex;
            align-items: center;
        }

        .hero h1 {
            font-weight: 600;
            font-size: 3.5rem;
            line-height: 1.1;
        }
        .text-purple { color: var(--violeta-oscuro); }
        .text-green { color: var(--verde-primario); }

        .hero p {
            font-size: 1.2rem;
            margin: 20px 0;
            max-width: 450px;
        }

        .btn-servicios {
            background-color: var(--verde-primario);
            color: white;
            border-radius: 8px;
            padding: 12px 30px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-servicios:hover {
            background-color: var(--verde-claro);
            transform: translateY(-2px);
        }

        /* Decoración curva (basada en tu header) */
        .wave-decoration {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 50%;
            z-index: -1;
        }

        .img-hero {
            border-radius: 0 0 0 100px;
            object-fit: cover;
            width: 100%;
            height: 500px;
            box-shadow: -20px 20px 0px var(--violeta-claro);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="logo.png" alt="Hireando" height="50">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-content="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link" href="#">INICIO</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">SERVICIOS</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">SOBRE NOSOTROS</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">RECURSOS</a></li>
                    <li class="nav-item">
                        <button class="btn-contactanos ms-lg-3">CONTÁCTANOS</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6" data-aos="fade-right">
                    <h1>
                        <span class="text-purple">Simple. Rápido.</span><br>
                        <span class="text-green">Hireando.</span>
                    </h1>
                    <p>Encontramos el talento que tu empresa necesita.</p>
                    <a href="#" class="btn-servicios">CONOCÉ NUESTROS SERVICIOS</a>
                </div>
                <div class="col-lg-6 mt-5 mt-lg-0" data-aos="fade-left">
                    <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=800" alt="Equipo trabajando" class="img-hero">
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Inicializar animaciones
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>
</body>
</html>
