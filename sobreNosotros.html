<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Nosotros | Hireando</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { 
            --verde-fuerte: #2EAD5B; 
            --verde-claro: #66C266;
            --violeta-fuerte: #6B42C1; 
            --violeta-suave: #A77BE6;
            --gris-texto: #4A4A4A; 
            --gris-fondo: #f8f9fa;
        }
        
        /* 2. MODIFICADO: Evitamos que Poppins rompa la fuente de los iconos */
        * {
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
        }

        /* Aseguramos que los iconos mantengan su propia fuente */
        .fab, .fas, .far, .fa {
            font-family: "Font Awesome 6 Brands", "Font Awesome 6 Free" !important;
        }

        body { 
            color: var(--gris-texto); 
            background-color: #fff;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        
        /* ... resto de tu CSS anterior se mantiene igual ... */

        main { flex: 1; }
        .section-padding { padding: 80px 0; }
        .title-semibold { font-weight: 600 !important; }
        h2.section-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 3.5rem;
            color: var(--violeta-fuerte);
            position: relative;
            padding-bottom: 15px;
            display: block;
        }
        h2.section-title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background-color: var(--verde-fuerte);
            border-radius: 2px;
        }
        .proposal-card {
            background: white;
            border-radius: 25px;
            padding: 40px 30px;
            height: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.04);
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .proposal-card:hover { 
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(107, 66, 193, 0.1);
        }
        .icon-wrapper {
            width: 100px;
            height: 100px;
            background-color: rgba(102, 194, 102, 0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            padding: 12px;
            overflow: hidden;
        }
        .proposal-icon {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .card-header-title {
            margin-bottom: 25px;
            width: 100%;
        }
        .card-header-title h3 {
            color: var(--violeta-fuerte);
            font-weight: 600; 
            font-size: 1.5rem;
            margin: 0;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }
        .card-header-title h3::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background-color: var(--verde-fuerte);
            border-radius: 2px;
        }
        .proposal-list { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
            text-align: left; 
            display: inline-block; 
        }
        .proposal-list li {
            margin-bottom: 12px;
            font-size: 1.05rem;
            color: var(--gris-texto);
            display: flex;
            align-items: center;
        }
        .proposal-list li::before {
            content: "✓";
            color: var(--verde-fuerte);
            font-weight: 700;
            margin-right: 12px;
        }
        .simple-text {
            font-size: 1.05rem;
            color: var(--gris-texto);
            margin: 0;
        }
    </style>
</head>
<body>
    <header id="menu-placeholder"></header>

    <main>
        <section class="section-padding container">
            <h2 class="section-title title-semibold" data-aos="fade-up">EL TALENTO NOS HACE ÚNICOS</h2>
            <div class="row g-4 justify-content-center">
                </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        async function loadComponent(url, elementId) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`No se pudo cargar ${url}`);
                const html = await response.text();
                document.getElementById(elementId).innerHTML = html;
            } catch (error) {
                console.error("Error cargando componente:", error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponent('nav.html', 'menu-placeholder');
            loadComponent('footer.html', 'footer-placeholder');
        });
    </script>
</body>
</html>
