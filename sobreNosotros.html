<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Nosotros | Hireando</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --verde-primario: #2EAD5B; --violeta-oscuro: #6B42C1; --gris-texto: #4A4A4A; }
        body { font-family: 'Poppins', sans-serif; color: var(--gris-texto); }
        .about-header { background: linear-gradient(135deg, var(--verde-primario), #66C266); color: white; padding: 60px 0; text-align: center; }
        .nav-link { color: var(--gris-texto); font-weight: 500; margin: 0 10px; }
        .btn-contactanos { background-color: var(--verde-primario); color: white; border-radius: 50px; padding: 8px 25px; border: none; }
    </style>
</head>
<body>
    <div id="menu-placeholder"></div>

    <header class="about-header">
        <div class="container" data-aos="fade-down">
            <h1>Nuestra Historia</h1>
            <p class="lead">Conectando el mejor talento con las mejores empresas.</p>
        </div>
    </header>

    <section class="py-5 container">
        <div class="row align-items-center">
            <div class="col-md-6" data-aos="fade-right">
                <h2 class="text-purple">¿Quiénes somos?</h2>
                <p>En <b>Hireando</b>, creemos que el reclutamiento no debe ser un proceso lento ni costoso. Somos expertos en identificar perfiles clave que se adaptan a la cultura de tu empresa.</p>
            </div>
            <div class="col-md-6" data-aos="fade-left">
                <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=600" class="img-fluid rounded-4 shadow" alt="Equipo">
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        fetch('nav.html').then(res => res.text()).then(data => document.getElementById('menu-placeholder').innerHTML = data);
    </script>
</body>
</html>
