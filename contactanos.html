<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos | Hireando</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde-primario: #2EAD5B; --violeta-oscuro: #6B42C1; --gris-texto: #4A4A4A; }
        body { font-family: 'Poppins', sans-serif; background-color: #f9f9f9; }
        .form-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: 50px; }
        .btn-enviar { background-color: var(--violeta-oscuro); color: white; border: none; padding: 10px 30px; border-radius: 8px; width: 100%; }
        .nav-link { color: var(--gris-texto); font-weight: 500; margin: 0 10px; }
        .btn-contactanos { background-color: var(--verde-primario); color: white; border-radius: 50px; padding: 8px 25px; border: none; }
    </style>
</head>
<body>
    <div id="menu-placeholder"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 form-container">
                <h2 class="text-center mb-4" style="color: var(--violeta-oscuro);">¡Hablemos!</h2>
                <form name="contacto" method="POST" data-netlify="true">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mensaje</label>
                        <textarea name="mensaje" class="form-control" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn-enviar">Enviar Mensaje</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        fetch('nav.html').then(res => res.text()).then(data => document.getElementById('menu-placeholder').innerHTML = data);
    </script>
</body>
</html>
