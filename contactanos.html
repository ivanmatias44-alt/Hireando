<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos | Hireando</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --verde-primario: #2EAD5B; 
            --violeta-oscuro: #6B42C1; 
            --gris-texto: #4A4A4A; 
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f9f9f9; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .content-wrapper {
            flex: 1;
            padding-bottom: 50px; 
        }

        .form-container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            margin-top: 50px; 
        }

        .btn-enviar { 
            background-color: var(--violeta-oscuro); 
            color: white; 
            border: none; 
            padding: 10px 30px; 
            border-radius: 8px; 
            width: 100%; 
            transition: all 0.3s ease;
        }

        .btn-enviar:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .nav-link { color: var(--gris-texto); font-weight: 500; margin: 0 10px; }
        
        .char-counter {
            font-size: 0.85rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    
    <div id="menu-placeholder"></div>

    <main class="content-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 form-container">
                    <h2 class="text-center mb-4" style="color: var(--violeta-oscuro);">¡Hablemos!</h2>
                    
                    <form name="contacto" method="POST" data-netlify="true" class="needs-validation" novalidate>
                        
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" 
                                   id="nombre"
                                   name="nombre" 
                                   class="form-control" 
                                   required 
                                   minlength="3" 
                                   maxlength="50"
                                   pattern="^[a-zA-ZÀ-ÿ\s]+$"
                                   title="Solo se permiten letras y espacios">
                            <div class="invalid-feedback">
                                El nombre solo puede contener letras y espacios.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" 
                                   id="email"
                                   name="email" 
                                   class="form-control" 
                                   required
                                   maxlength="100"
                                   pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
                            <div class="invalid-feedback">
                                Ingresa un correo electrónico válido (sin espacios ni símbolos peligrosos).
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="mensajeInput" class="form-label">Mensaje</label>
                            <textarea id="mensajeInput" 
                                      name="mensaje" 
                                      class="form-control" 
                                      rows="4" 
                                      required 
                                      minlength="10" 
                                      maxlength="1000"
                                      title="Se permiten letras, números y puntuación básica (. , ! ? ( ) - _)"></textarea>
                            <div class="d-flex justify-content-between mt-1">
                                <div class="text-danger small d-none" id="error-mensaje">
                                    Caracteres no permitidos detectados y eliminados.
                                </div>
                                <div class="char-counter ms-auto" id="charCount">0 / 1000</div>
                            </div>
                            <div class="invalid-feedback">
                                El mensaje es obligatorio (mínimo 10 caracteres).
                            </div>
                        </div>

                        <button type="submit" class="btn-enviar">Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Carga de componentes
        function loadComponent(url, elementId) {
            fetch(url)
                .then(res => res.ok ? res.text() : Promise.reject())
                .then(data => { document.getElementById(elementId).innerHTML = data; })
                .catch(err => console.error(err));
        }

        loadComponent('nav.html', 'menu-placeholder');
        loadComponent('footer.html', 'footer-placeholder');

        // Validación de Bootstrap
        (() => {
          'use strict'
          const forms = document.querySelectorAll('.needs-validation')
          Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
              if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
              }
              form.classList.add('was-validated')
            }, false)
          })
        })()

        /**
         * ESTRATEGIA DE SEGURIDAD: WHITELIST
         * Filtramos caracteres en tiempo real para evitar inyecciones.
         */
        const filtros = {
            // Nombre: Solo letras y espacios
            'nombre': /[^a-zA-ZÀ-ÿ\s]/g,
            
            // Mensaje: Alfanuméricos + Puntuación recomendada (. , ! ? ( ) - _) + Saltos de línea
            // Nota: Se escapan caracteres especiales en la regex [\-\(\)\?\!\._]
            'mensajeInput': /[^a-zA-ZÀ-ÿ0-9\s\.\,\!\?\(\)\-\_\n]/g 
        };

        Object.keys(filtros).forEach(id => {
            const el = document.getElementById(id);
            const errorMsg = document.getElementById('error-mensaje');

            el.addEventListener('input', (e) => {
                const regex = filtros[id];
                const originalValue = e.target.value;
                const cleanedValue = originalValue.replace(regex, '');
                
                // Si el valor cambió, es porque intentaron ingresar un caracter prohibido
                if (originalValue !== cleanedValue) {
                    e.target.value = cleanedValue;
                    if(errorMsg) {
                        errorMsg.classList.remove('d-none');
                        setTimeout(() => errorMsg.classList.add('d-none'), 2000);
                    }
                }
                
                // Actualizar contador
                if (id === 'mensajeInput') {
                    document.getElementById('charCount').textContent = `${e.target.value.length} / 1000`;
                }
            });
        });

        // Limpieza estricta de Email (No permite espacios ni etiquetas)
        document.getElementById('email').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[<>"'\s\\]/g, '');
        });

        // Parámetros URL para autorelleno seguro
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('ref') === 'planes') {
                const msg = document.getElementById('mensajeInput');
                if (msg) {
                    msg.value = "Hola, estuve viendo los planes de Hireando y me gustaría recibir más información.";
                    msg.dispatchEvent(new Event('input'));
                }
            }
        });
    </script>
</body>
</html>
