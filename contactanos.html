<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos | Hireando</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --verde-primario: #2EAD5B; 
            --violeta-oscuro: #6B42C1; 
            --gris-texto: #4A4A4A; 
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f9f9f9; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .content-wrapper {
            flex: 1;
            padding-bottom: 50px; 
        }

        .form-container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            margin-top: 50px; 
        }

        .btn-enviar { 
            background-color: var(--violeta-oscuro); 
            color: white; 
            border: none; 
            padding: 10px 30px; 
            border-radius: 8px; 
            width: 100%; 
            transition: all 0.3s ease;
        }

        .btn-enviar:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .nav-link { color: var(--gris-texto); font-weight: 500; margin: 0 10px; }
        .btn-contactanos { background-color: var(--verde-primario); color: white; border-radius: 50px; padding: 8px 25px; border: none; }
        
        /* Estilo para el contador de caracteres */
        .char-counter {
            font-size: 0.85rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    
    <div id="menu-placeholder"></div>

    <main class="content-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 form-container">
                    <h2 class="text-center mb-4" style="color: var(--violeta-oscuro);">¡Hablemos!</h2>
                    
                    <form name="contacto" method="POST" data-netlify="true" class="needs-validation" novalidate>
                        
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" 
                                   id="nombre"
                                   name="nombre" 
                                   class="form-control" 
                                   required 
                                   minlength="3" 
                                   maxlength="50"
                                   pattern="^[a-zA-ZÀ-ÿ\s]+$"
                                   title="Solo se permiten letras y espacios">
                            <div class="invalid-feedback">
                                Por favor, ingresa un nombre válido (solo letras y espacios, mín. 3 caracteres).
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" 
                                   id="email"
                                   name="email" 
                                   class="form-control" 
                                   required
                                   maxlength="100"
                                   pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
                            <div class="invalid-feedback">
                                Ingresa un correo electrónico válido (ejemplo@dominio.com).
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="mensajeInput" class="form-label">Mensaje</label>
                            <textarea id="mensajeInput" 
                                      name="mensaje" 
                                      class="form-control" 
                                      rows="4" 
                                      required 
                                      minlength="10" 
                                      maxlength="1000"></textarea>
                            <div class="d-flex justify-content-between mt-1">
                                <div class="invalid-feedback" style="display: block; visibility: hidden;" id="mensaje-error">
                                    El mensaje no puede contener caracteres de código (< o >).
                                </div>
                                <div class="char-counter" id="charCount">0 / 1000</div>
                            </div>
                        </div>

                        <button type="submit" class="btn-enviar">Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 1. CARGA DE COMPONENTES
        function loadComponent(url, elementId) {
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error(`Error al cargar ${url}`);
                    return res.text();
                })
                .then(data => {
                    document.getElementById(elementId).innerHTML = data;
                })
                .catch(err => console.error(err));
        }

        loadComponent('nav.html', 'menu-placeholder');
        loadComponent('footer.html', 'footer-placeholder');

        // 2. VALIDACIÓN DE BOOTSTRAP AL ENVIAR
        (() => {
          'use strict'
          const forms = document.querySelectorAll('.needs-validation')
          Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
              if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
              }
              form.classList.add('was-validated')
            }, false)
          })
        })()

        // 3. SANITIZACIÓN Y LIMPIEZA EN TIEMPO REAL
        const nombreInput = document.getElementById('nombre');
        const emailInput = document.getElementById('email');
        const mensajeInput = document.getElementById('mensajeInput');
        const charCount = document.getElementById('charCount');

        // Nombre: Solo letras y espacios
        nombreInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, '');
        });

        // Email: Bloquear espacios y caracteres peligrosos de inmediato
        emailInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[<>\s]/g, '');
        });

        // Mensaje: Bloquear etiquetas HTML y actualizar contador
        mensajeInput.addEventListener('input', (e) => {
            const originalValue = e.target.value;
            // Eliminamos < y > para evitar inyecciones básicas
            const cleanedValue = originalValue.replace(/[<>]/g, '');
            
            if (originalValue !== cleanedValue) {
                e.target.value = cleanedValue;
                document.getElementById('mensaje-error').style.visibility = 'visible';
            } else {
                document.getElementById('mensaje-error').style.visibility = 'hidden';
            }

            const currentLength = e.target.value.length;
            charCount.textContent = `${currentLength} / 1000`;
        });

        // 4. LÓGICA DE PARÁMETROS URL (REF)
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const source = urlParams.get('ref');

            if (source === 'planes') {
                if (mensajeInput) {
                    mensajeInput.value = "Hola, estuve viendo los planes de Hireando y me gustaría recibir más información.\n¿Podrían ayudarme a encontrar el plan ideal para mi búsqueda?";
                    mensajeInput.dispatchEvent(new Event('input'));
                }
            }
        });
    </script>
</body>
</html>
